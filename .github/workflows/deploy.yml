name: Deploy to Salesforce

on:
  push:
    branches:
      - main # Or your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository code
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. DEBUGGING STEP: List all files recursively
      - name: List files in the workspace
        run: ls -R

      # 3. Set up Node.js, required for Salesforce CLI
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Install the Salesforce CLI
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      # 5. Create the server.key file for authentication
      - name: Populate private key
        run: echo "${{ secrets.SF_SERVER_KEY }}" > server.key

      # 6. Convert the source code into the Metadata API format
      - name: Convert to Metadata API Format
        run: |
          sf project convert mdapi --root-dir force-app --output-dir mdapi-deploy
          
          # Verify the conversion was successful
          if [ ! -d "mdapi-deploy" ] || [ -z "$(ls -A mdapi-deploy)" ]; then
            echo "Error: No metadata to deploy. Conversion produced empty output."
            exit 1
          fi
          echo "Metadata conversion successful. Contents:"
          ls -R mdapi-deploy

      # 7. Deploy the converted metadata
      - name: Deploy to Salesforce
        run: |
          sf project deploy mdapi --deploy-dir mdapi-deploy --target-org ${{ secrets.SF_USERNAME }}
