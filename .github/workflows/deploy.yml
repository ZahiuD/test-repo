name: Deploy to Salesforce

on:
  push:
    branches:
      - main # Or your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository code
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Node.js, required for Salesforce CLI
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install the Salesforce CLI
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      # 4. Create the server.key file for authentication
      - name: Populate private key
        run: echo "${{ secrets.SF_SERVER_KEY }}" > server.key

      # 5. Authenticate, Generate Manifest, and Deploy
      - name: Authenticate, Generate Manifest, and Deploy
        run: |
          # Authenticate to the Salesforce Org using JWT
          sf org login jwt \
            --username ${{ secrets.SF_USERNAME }} \
            --client-id ${{ secrets.SF_CLIENT_ID }} \
            --jwt-key-file server.key \
            --instance-url ${{ secrets.SF_LOGIN_URL }}

          # Explicitly generate a manifest (package.xml) from the source code
          sf project generate manifest --source-dir force-app --name MyPackage

          # Deploy using the generated manifest file, which forces deployment of all listed components
          sf project deploy start --manifest MyPackage/package.xml --target-org ${{ secrets.SF_USERNAME }}
