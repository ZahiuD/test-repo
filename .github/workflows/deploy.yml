name: Deploy to Salesforce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      # 1. Checkout
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Salesforce CLI
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      # 4. Write private key
      - name: Populate private key
        run: echo "${{ secrets.SF_SERVER_KEY }}" > server.key

      # 5. Authenticate via JWT Bearer Flow
      - name: Authenticate to Salesforce (JWT)
        run: |
          sf org login jwt \
            --username "${{ secrets.SF_USERNAME }}" \
            --jwt-key-file server.key \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias target-org \
            --set-default

      # 6. Deploy source directly (no mdapi conversion needed)
      - name: Deploy to Salesforce
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org target-org \
            --wait 30

      # 7. Always clean up the private key
      - name: Clean up private key
        if: always()
        run: rm -f server.key
